name: Template Fitness

on:
  pull_request:
  push:

jobs:
  template-fitness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --test scripts/harness-bootstrap-plan.test.mjs
      - run: node --test scripts/prepare-stable-release.test.mjs
      - run: node scripts/template-fitness.mjs
