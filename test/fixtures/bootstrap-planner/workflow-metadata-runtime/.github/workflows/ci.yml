name: ci
on: [push]
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: docker/build-push-action@v6
        with:
          push: "${{ github.ref == 'refs/heads/main' }}"
      - run: npm test
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      - env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm run build
      - run: |
          docker buildx build \
            --push \
            -t ghcr.io/acme/app:latest .
      - run: >
          git
          push origin main
