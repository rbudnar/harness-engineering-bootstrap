name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/default
    steps:
      - name: Test API
        working-directory: services/api
        run: npm test
      - name: Test Web
        run: npm test
        working-directory: services/web
      - name: Test Default
        run: npm test
